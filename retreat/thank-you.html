<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送信ありがとうございました | Holistic Retreat</title>
    <meta name="robots" content="noindex,follow">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Shippori+Mincho:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F7F6F2;
            --bg-white: rgba(255, 255, 255, 0.86);
            --text-main: #2A2825;
            --text-light: #7A7875;
            --border-color: #E2E0DB;
        }
        body {
            font-family: 'Shippori Mincho', serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            letter-spacing: 0.08em;
            -webkit-font-smoothing: antialiased;
        }
        .font-en { font-family: 'Cormorant Garamond', serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6">
    <main class="max-w-2xl w-full text-center border border-[var(--border-color)] bg-[var(--bg-white)] backdrop-blur-md shadow-sm p-8 sm:p-12 md:p-16">
        <span class="font-en text-xs tracking-[0.38em] text-[var(--text-light)] uppercase block mb-6">Contact</span>
        <h1 class="text-2xl sm:text-3xl md:text-4xl tracking-[0.18em] text-[var(--text-main)]">送信ありがとうございました</h1>
        <p class="mt-8 text-sm sm:text-base leading-[2.2] tracking-[0.12em] text-[var(--text-main)]">内容を確認のうえ、順次ご連絡いたします。</p>
        <p class="mt-3 text-sm sm:text-base leading-[2.2] tracking-[0.12em] text-[var(--text-main)]">しばらく経っても返信がない場合は、入力いただいたご連絡先をご確認のうえ、あらためてお送りください。</p>
        <div class="mt-10">
            <a href="./index.html#apply" class="inline-block border border-[var(--text-main)] bg-[var(--text-main)] text-[var(--bg-white)] px-10 py-4 text-xs tracking-[0.24em] hover:bg-transparent hover:text-[var(--text-main)] transition-all duration-500 rounded-sm">戻る</a>
        </div>
    </main>
</body>
</html>
